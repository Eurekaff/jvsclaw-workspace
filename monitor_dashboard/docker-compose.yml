version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "8001:8001"
    volumes:
      - ../../workspace:/workspace
    environment:
      - WORKSPACE_PATH=/workspace
  
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
